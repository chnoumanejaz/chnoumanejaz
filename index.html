    <!-- Preconnect to Google Fonts to reduce DNS lookup and connection time -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Async load fonts to prevent render blocking -->
    <link 
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" 
      rel="stylesheet" 
      media="print" 
      onload="this.media='all'" 
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    </noscript>
    
    <!-- Prevent FOIT with system font fallback -->
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }
    </style>
    
    <script>
      // Prevent flash of light theme on page load
      (function() {
        try {
          const theme = localStorage.getItem('theme');
          if (theme) {
            document.documentElement.classList.add(theme);
          } else {
            // Default to dark theme
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          // Fallback to dark theme if localStorage is not available
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
